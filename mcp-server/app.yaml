command: [
  "mcp-neo4j-cypher",
  "--transport", "http",
  "--server-host", "0.0.0.0",
  "--server-port", "$DATABRICKS_APP_PORT",
  "--namespace", "neo4j",
]

env:
  - name: NEO4J_URI
    valueFrom: "neo4j_uri"
  - name: NEO4J_USERNAME
    valueFrom: "neo4j_username"
  - name: NEO4J_PASSWORD
    valueFrom: "neo4j_password"
  - name: NEO4J_DATABASE
    valueFrom: "neo4j_database"
  - name: NEO4J_MCP_SERVER_PATH
    value: "/mcp/"
  - name: NEO4J_READ_ONLY
    value: "true"
