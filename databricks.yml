bundle:
  name: neo4j_databricks_agent

resources:
  experiments:
    neo4j_agent_experiment:
      name: "/Shared/neo4j-databricks-agent"

  secret_scopes:
    neo4j:
      name: "neo4j"
    mcp_neo4j:
      name: "mcp-neo4j"

  apps:
    neo4j_databricks_agent:
      name: "neo4j-databricks-agent"
      description: "Databricks Apps agent that answers questions using read-only Neo4j Cypher tools"
      source_code_path: ./
      config:
        command: ["uvicorn", "agent_server.start_server:app", "--host", "0.0.0.0", "--port", "$DATABRICKS_APP_PORT"]
        env:
          - name: MLFLOW_TRACKING_URI
            value: "databricks"
          - name: MLFLOW_REGISTRY_URI
            value: "databricks-uc"
          - name: NEO4J_MAX_ROWS
            value: "25"
          - name: DATABRICKS_AGENT_MODEL
            value_from: "llm"
          - name: MLFLOW_EXPERIMENT_ID
            value_from: "experiment"
          - name: NEO4J_URI
            value_from: "neo4j_uri"
          - name: NEO4J_USERNAME
            value_from: "neo4j_username"
          - name: NEO4J_PASSWORD
            value_from: "neo4j_password"
          - name: NEO4J_DATABASE
            value_from: "neo4j_database"

      resources:
        - name: "experiment"
          experiment:
            experiment_id: "${resources.experiments.neo4j_agent_experiment.id}"
            permission: "CAN_MANAGE"
        - name: "llm"
          serving_endpoint:
            name: "databricks-claude-sonnet-4-5"
            permission: "CAN_QUERY"
        - name: "neo4j_uri"
          secret:
            scope: "neo4j"
            key: "NEO4J_URI"
            permission: "READ"
        - name: "neo4j_username"
          secret:
            scope: "neo4j"
            key: "NEO4J_USERNAME"
            permission: "READ"
        - name: "neo4j_password"
          secret:
            scope: "neo4j"
            key: "NEO4J_PASSWORD"
            permission: "READ"
        - name: "neo4j_database"
          secret:
            scope: "neo4j"
            key: "NEO4J_DATABASE"
            permission: "READ"

    mcp_neo4j_cypher:
      name: "mcp-neo4j-cypher"
      description: "FastMCP-based Neo4j Cypher MCP server with demo landing page. Read-only."
      source_code_path: ./mcp-server
      config:
        command: ["uvicorn", "server:app", "--host", "0.0.0.0", "--port", "$DATABRICKS_APP_PORT"]
        env:
          - name: NEO4J_MAX_ROWS
            value: "50"
          - name: NEO4J_URI
            value_from: "neo4j_uri"
          - name: NEO4J_USERNAME
            value_from: "neo4j_username"
          - name: NEO4J_PASSWORD
            value_from: "neo4j_password"
          - name: NEO4J_DATABASE
            value_from: "neo4j_database"

      resources:
        - name: "neo4j_uri"
          secret:
            scope: "mcp-neo4j"
            key: "neo4j_uri"
            permission: "READ"
        - name: "neo4j_username"
          secret:
            scope: "mcp-neo4j"
            key: "neo4j_username"
            permission: "READ"
        - name: "neo4j_password"
          secret:
            scope: "mcp-neo4j"
            key: "neo4j_password"
            permission: "READ"
        - name: "neo4j_database"
          secret:
            scope: "mcp-neo4j"
            key: "neo4j_database"
            permission: "READ"

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: "https://dbc-de840360-1abb.cloud.databricks.com"

  prod:
    mode: production
    workspace:
      host: "https://dbc-de840360-1abb.cloud.databricks.com"
    resources:
      apps:
        neo4j_databricks_agent:
          name: "neo4j-databricks-agent"
        mcp_neo4j_cypher:
          name: "mcp-neo4j-cypher"
